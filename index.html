<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- INÍCIO DA CARCAÇA -->
    <div class="calculadora-corpo">
      <box>
        <form>
          <output class="visor" name="visor" id="calculadora-visor">0</output>
        </form>
      </box>

      <div class="botoes">
        <button id="clear">C</button>
        <button id="percent">%</button>
        <button id="raiz">&radic;</button>
        <button id="backspace">&#x232b;</button>
        <button id="sete">7</button>
        <button id="oito">8</button>
        <button id="nove">9</button>
        <button id="divide">&divide;</button>
        <button id="quatro">4</button>
        <button id="cinco">5</button>
        <button id="seis">6</button>
        <button id="multi">*</button>
        <button id="um">1</button>
        <button id="dois">2</button>
        <button id="tres">3</button>
        <button id="menos">-</button>
        <button id="zero">0</button>
        <button id="point">.</button>
        <button id="enter">=</button>
        <button id="plus">+</button>
      </div>
    </div>
    <!-- FIM DA CARCAÇA -->

    <script src="script.js"></script>
  </body>
</html>
